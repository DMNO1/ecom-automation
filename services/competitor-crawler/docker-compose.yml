version: '3.8'

services:
  # 竞品爬虫服务
  competitor-crawler:
    build: .
    container_name: competitor-crawler
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - MONGODB_DATABASE=competitor_crawler
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8000
      - DEBUG=false
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - mongodb
    networks:
      - crawler-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MongoDB数据库
  mongodb:
    image: mongo:latest
    container_name: competitor-crawler-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=competitor_crawler
    volumes:
      - mongodb-data:/data/db
      - mongodb-config:/data/configdb
    networks:
      - crawler-network
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

  # Redis（可选，用于任务队列）
  redis:
    image: redis:alpine
    container_name: competitor-crawler-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - crawler-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  # MongoDB管理界面（可选）
  mongo-express:
    image: mongo-express:latest
    container_name: competitor-crawler-mongo-express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_MONGODB_ENABLE_ADMIN=false
      - ME_CONFIG_MONGODB_AUTH_DATABASE=competitor_crawler
    depends_on:
      - mongodb
    networks:
      - crawler-network
    restart: unless-stopped
    profiles:
      - dev

networks:
  crawler-network:
    driver: bridge

volumes:
  mongodb-data:
    driver: local
  mongodb-config:
    driver: local
  redis-data:
    driver: local
